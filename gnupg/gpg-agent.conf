# WSL2: auto-switch pinentry based on TTY availability
# TTYあり (terminal) → pinentry-curses / TTY なし (VSCode) → pinentry-gnome3 (WSLg GUI)
pinentry-program /home/taka/.gnupg/pinentry-auto.sh

# Cache passphrase for 8 hours (28800 seconds)
default-cache-ttl 28800
max-cache-ttl 28800

# Disable scdaemon (smartcard not used, prevents agent crash)
disable-scdaemon
