- hosts: all
  sudo: yes
  user: vagrant 
  tasks:
    - name: Install packages
      apt-get: name={{item}}
      with_items:
        # For the shell needs
        - vim
        - zsh
        - git
        - tig
        - tmux
        - ranger
        - ctags
        # X
        - xsel
        - uim
        - urxvt
        - urxvt-perls
        - xmonad
        - xmonad-contrib
        - xmobar
        - leafpad
        # lang
        - haskell-stack
