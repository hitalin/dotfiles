# KeyBindings
## the last window
bind C-q next-window

# reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# set key-binds of visual mode like vim
set-window-option -g mode-keys vi

# StatusBar
set-option -g status-interval 30

# Option
## Esc
set -s escape-time 0
set -sg escape-time 1
## control settings
setw -g monitor-activity on
set -g visual-activity on
set -g history-limit 50000
set -g automatic-rename off
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1

# view setting
## Border
set -g pane-border-style fg=white
set -g pane-active-border-style fg=magenta
## true color + undercurl support
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set-option -ga terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"
## status bar
set-option -g status-interval 30
set -g status-bg black
set -g status-fg white
set -g status-left '#[fg=green,bg=#303031]#{?client_prefix,#[reverse],} #H[#S] #[default]'
set -g status-right '#[fg=green,bold][%Y/%m/%d(%a)%H:%M]#[default]'
## active border
set -g pane-active-border-style fg=black
set -g pane-active-border-style bg=green
set -g window-status-current-style bg=green
set -g window-status-current-style fg=white

# Terminal emulator window titles
set -g set-titles on
set -g set-titles-string "#T"

# mouse
set -g mouse on
bind-key m set-option -g mouse on \; display 'Mouse: ON'
bind-key M set-option -g mouse off \; display 'Mouse: OFF'

# copy and paste (OSC52 — works natively in WSL2/modern terminals)
set -g mode-keys vi
set -g set-clipboard on
set -g allow-passthrough on

# https://github.com/catppuccin/tmux
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "user host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# tmux-plugins/tmux-yank to yank
## List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'catppuccin/tmux'

## Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
