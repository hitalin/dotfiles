# Prefix
set-option -g prefix C-a
# unlock default prefix(C-b)
unbind C-b
# press Ctrl-g*2 to send-prefix
bind C-a send-prefix

# Option
# set key-binds of visual mode like vim
set-window-option -g mode-keys vi

# set the base number of pane
set-option -g base-index 1
# max line of history of windows
set-option -g history-limit 5000

# KeyBindings
# the last window
bind C-q next-window
# reload settings
#bind r source-file ~/.tmux.conf
#bind r source-file ~/.tmux.conf ; display-message "Reloaded!"

# split windows like vim
# vim's definition of horizontal/vertical split is reversed from tmux's
# split the pane longitudinary
bind s split-window -v
# split the pane transversely
bind v split-window -h

# moving between panes with vim movement keys 
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes with vim movement keys 
bind -r H resize-pane -L 10
bind -r J resize-pane -R 10
bind -r K resize-pane -D 10
bind -r L resize-pane -U 10

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# vi-style controls for copy mode
setw -g mode-keys vi

## y and p as in vim
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'Space' send -X halfpage-down
bind-key -T copy-mode-vi 'Bspace' send -X halfpage-up

# StatusBar
set-option -g status-interval 30

# Border
set -g pane-border-style fg=white
set -g pane-active-border-style fg=magenta

# Other
## Esc
set -s escape-time 0

## control settings
set -g mode-keys vi
set -g automatic-rename off
set -sg escape-time 1

# color settings
#set-option -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm:colors=256'

# view settings
## status bar
set -g status-bg black
set -g status-fg white
set -g status-left '#[fg=white,bg=black]#H#[fg=white]:#[fg=white][#S#[fg=white]]'
set -g status-right '#[fg=cyan,bold][%Y/%m/%d(%a)%H:%M]#[default]'
set-option -g status-left '#[fg=cyan,bg=#303030]#{?client_prefix,#[reverse],} #H[#S] #[default]'
## active border
set -g pane-active-border-style fg=black
set -g pane-active-border-style bg=cyan
set -g window-status-current-style bg=cyan
set -g window-status-current-style fg=white

# shell settings
set-option -g default-shell /usr/bin/zsh

# sync clipboard 
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind-key p run "xsel -o | tmux load-buffer - ; tmux paste-buffer"

# for urxvt perl-extention "osc-xterm-clipboard" 
set-option -ga terminal-override ',rxvt-uni*:XT:Ms=\E]52;%p1%s;%p2%s\007'
set -g mouse on
