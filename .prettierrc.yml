printWidth: 160
tabWidth: 2
useTabs: false
semi: true
singleQuote: true
jsxSingleQuote: true
quoteProps: as-needed
trailingComma: es5
bracketSpacing: true
bracketSameLine: false
arrowParens: always
requirePragma: false
insertPragma: false
htmlWhitespaceSensitivity: strict
vueIndentScriptAndStyle: false
endOfLine: lf
embeddedLanguageFormatting: auto
singleAttributePerLine: false

overrides:
  - files: "*.html"
    options:
      tabWidth: 4
  - files: "*.css"
    options:
      tabWidth: 4
